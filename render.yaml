services:
  - type: web
    name: rtpg-gestao
    runtime: node
    plan: starter
    region: ohio
    repo: https://github.com/ruamnilton-cyber/RTPG
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm run db:push && npm start
    healthCheckPath: /api/health
    disk:
      name: rtpg-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: RTPG_DATA_DIR
        value: /var/data/rtpg
      - key: SAAS_TRIAL_DAYS
        value: "14"
      - key: JWT_SECRET
        generateValue: true
      - key: APP_BASE_URL
        value: https://rtpgapp.com
      - key: PLATFORM_ASAAS_API_KEY
        sync: false
      - key: PLATFORM_ASAAS_SANDBOX
        value: "true"
      - key: PLATFORM_ASAAS_WEBHOOK_TOKEN
        sync: false
      - key: SES_SMTP_HOST
        value: email-smtp.us-east-1.amazonaws.com
      - key: SES_SMTP_PORT
        value: "587"
      - key: SES_SMTP_USER
        sync: false
      - key: SES_SMTP_PASS
        sync: false
      - key: SES_FROM_EMAIL
        value: comercial@rtpgapp.com
      - key: SES_FROM_NAME
        value: RTPG App
